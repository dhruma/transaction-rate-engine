spring:
  application:
    name: wex-purchase-currency-service

  # File-based H2 so stored transactions survive a restart (demonstrates the
  # "persist" requirement) while still requiring zero external DB install.
  datasource:
    url: jdbc:h2:file:./data/wex;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  # Don't let browsers cache the UI assets — otherwise a stale app.js can make the
  # transaction list look broken after an update. Fine for this app's traffic profile.
  web:
    resources:
      cache:
        cachecontrol:
          no-store: true

server:
  port: 8080

# Treasury Reporting Rates of Exchange API.
treasury:
  base-url: https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange
  connect-timeout-ms: 3000
  read-timeout-ms: 5000

# API-key auth is OFF by default so reviewers can run the app friction-free.
# Production auth approach is documented in the README.
app:
  auth:
    enabled: false
    header-name: X-API-Key
    api-key: change-me

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.wex.currency: INFO
